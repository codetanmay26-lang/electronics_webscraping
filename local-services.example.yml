services:
  searxng:
    image: searxng/searxng:latest
    container_name: openclaw-searxng
    ports:
      - "8080:8080"
    environment:
      - BASE_URL=http://localhost:8080/
      - INSTANCE_NAME=openclaw-local
    volumes:
      - ./work/searxng:/etc/searxng
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: openclaw-ollama
    ports:
      - "11434:11434"
    volumes:
      - ./work/ollama:/root/.ollama
    restart: unless-stopped

